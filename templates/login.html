<!DOCTYPE html>
<html>
<head>
    <title>Squid Enterprise</title>
    <style>
        body{ margin:0; font-family:Arial; background:#0f172a; color:#fff; }
        .box{ width:350px; margin:120px auto; background:#1e293b; padding:30px; border-radius:12px; }
        input{ width:100%; padding:12px; margin:10px 0; background:#111; border:1px solid #333; color:#fff; box-sizing: border-box; }
        button{ width:100%; padding:12px; background:#2563eb; border:0; color:#fff; cursor:pointer; font-weight: bold; border-radius: 6px; }
        footer{ position:fixed; bottom:0; width:100%; text-align:center; padding:10px; background:#020617; color:#94a3b8; font-size:14px; }
        .error{ background:#dc2626; padding:10px; border-radius:8px; margin-bottom:12px; color:#fff; text-align: center; }
    </style>
</head>
<body>
<div class="box">
    <h2> Admin Login</h2>
    {% if request.query_params.get('error') %}<div class="error">Invalid Credentials</div>{% endif %}
    <form method="post" action="/login">
        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
<footer>© 2026 Rizwan Saleem .</footer>
</body></html>
